services:
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: learnflow-rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672' # management UI (guest/guest)
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:8
    container_name: learnflow-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  postgres:
    image: postgres:17-alpine
    container_name: learnflow-postgres
    environment:
      POSTGRES_USER: learnflow
      POSTGRES_PASSWORD: learnflow
      POSTGRES_DB: enrollment
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  mongo-data:
  postgres-data:
